<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Chiroyli Vazifa Menejeri</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <i class="fas fa-tasks"></i>
                    Todo App
                </h1>
                <p class="subtitle">Vazifalaringizni chiroyli boshqaring</p>
            </div>
        </header>

        <main class="main-content">
            <div class="todo-input-section">
                <form id="todoForm" class="todo-form">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="todoInput" 
                            placeholder="Yangi vazifa qo'shing..." 
                            class="todo-input"
                            autocomplete="off"
                        >
                        <button type="submit" class="add-btn" id="addBtn">
                            <i class="fas fa-plus"></i>
                            Qo'shish
                        </button>
                    </div>
                </form>
            </div>

            <div class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalCount">0</div>
                        <div class="stat-label">Jami vazifalar</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="completedCount">0</div>
                        <div class="stat-label">Bajarilgan</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="pendingCount">0</div>
                        <div class="stat-label">Kutilmoqda</div>
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-list"></i>
                        Barchasi
                    </button>
                    <button class="filter-btn" data-filter="pending">
                        <i class="fas fa-clock"></i>
                        Kutilmoqda
                    </button>
                    <button class="filter-btn" data-filter="completed">
                        <i class="fas fa-check-circle"></i>
                        Bajarilgan
                    </button>
                </div>
            </div>

            <div class="todo-list-section">
                <div id="todoList" class="todo-list">
                    <!-- Todo items will be dynamically added here -->
                </div>
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-clipboard-list"></i>
                    <h3>Hozircha vazifalar yo'q</h3>
                    <p>Birinchi vazifangizni qo'shing va boshlang!</p>
                </div>
            </div>

            <div class="actions-section">
                <button id="clearCompleted" class="action-btn secondary">
                    <i class="fas fa-broom"></i>
                    Bajarilganlarni tozalash
                </button>
                <button id="clearAll" class="action-btn danger">
                    <i class="fas fa-trash-alt"></i>
                    Barchasini o'chirish
                </button>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 Todo App. Chiroyli va samarali vazifa boshqaruvi.</p>
        </footer>
    </div>

    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script src="js/controller.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
